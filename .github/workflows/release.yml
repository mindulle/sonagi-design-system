name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Git 커밋 및 태그 푸시 권한
      issues: write   # 이슈 코멘트 권한
      pull-requests: write # PR 코멘트 권한
      id-token: write # NPM provenance 지원용 (선택)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release가 모든 커밋 기록을 분석할 수 있도록 설정
          persist-credentials: false # semantic-release/git을 위해 필요

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build

      - name: Test build outputs
        run: npm run test

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

