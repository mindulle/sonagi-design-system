name: Release

on:
  push:
    branches:
      - main

jobs:
  release-tokens:
    name: Release @sonagi/tokens
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Git 커밋 및 태그 푸시 권한
      issues: write          # 이슈 코멘트 권한
      pull-requests: write   # PR 코멘트 권한
      id-token: write        # NPM provenance 지원용 (선택)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0              # semantic-release가 모든 커밋 기록을 분석할 수 있도록 설정
          persist-credentials: false  # semantic-release/git을 위해 필요

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens
        run: pnpm --filter @sonagi/tokens build

      - name: Test build outputs
        run: pnpm --filter @sonagi/tokens test

      - name: Run Semantic Release
        working-directory: packages/tokens
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  release-ui:
    name: Release @sonagi/ui
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ui
        run: pnpm --filter @sonagi/ui build

      - name: Test ui
        run: pnpm --filter @sonagi/ui test

      - name: Run Semantic Release
        working-directory: packages/ui
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
