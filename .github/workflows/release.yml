name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build

      - name: Validate build output
        run: |
          test -f dist/variables.css || (echo "Missing dist/variables.css" && exit 1)
          test -f dist/index.js      || (echo "Missing dist/index.js" && exit 1)
          test -f dist/index.mjs     || (echo "Missing dist/index.mjs" && exit 1)
          test -f dist/index.d.ts    || (echo "Missing dist/index.d.ts" && exit 1)
          echo "✅ All dist files present"
